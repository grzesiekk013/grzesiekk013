<div class="modal fade" id="delete_user_modal{{ user.id }}">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <form method="POST" action="{%url 'manage_delete_user' user.id %}">
        {% csrf_token %}
        <div class="modal-header">
          <p class="h4"><span class="bi bi-archive"></span>  Użytkownik <i>{{ user.username }}</i></p>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>

        <div class="modal-body">
          {% if request.user.id != user.id %}
          <p class="h5">Czy jesteś pewien?</p>
          {% else %}
          <p class="h5">Nie możesz usunąć siebie samego</p>
          {% endif %}
          <div class="modal-footer">
            {% if request.user.id != user.id %}
            <button type="submit" class="btn btn-sm btn-outline-success"><span class="bi bi-archive"></span>  Usuń</button>
            {% endif %}
            <button type="button" class="btn btn-sm btn-outline-danger" data-bs-dismiss="modal"><span class="bi bi-x-square"></span>  Anuluj</button>
          </div>
        </div>

      </form>
    </div>
  </div>
</div>
