<div class="modal fade" id="password_change">
    <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <form method="POST" action="{%url 'password_change' %}">
        {% csrf_token %}
        <div class="modal-header">
          <p class="h4"><span class="bi bi-pencil-square"></span>  Zmiana hasła <i>{{ request.user.first_name}} {{ request.user.last_name }}</i> </p>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <hr>
        <div class="modal-body">
          <div class="form-group mb-2">
            <label for="passwd_old">Obecne hasło</label>
            <div class="btn-group me-2" role="group" aria-label="">
            <input id="passwd_old" type="password" class="form-control form-control-sm" name="passwd_old" required minlength="8" maxlength="128" autofocus>
              <button type="button" id="togglePasswd_old" class="btn btn-sm btn-outline-dark"><span class="bi bi-eye"></span></button>
            </div>
          </div>
          <div class="form-group mb-2">
            <label for="passwd">Nowe Hasło</label>
            <div class="btn-group me-2" role="group" aria-label="">
            <input id="passwd" type="password" class="form-control form-control-sm" name="passwd" required minlength="8" maxlength="128" autofocus>
              <button type="button" id="togglePasswd_cur" class="btn btn-sm btn-outline-dark"><span class="bi bi-eye"></span></button>
            </div>
          </div>
          <div class="form-group mb-2">
            <label for="passwd_confirm">Powtórz Nowe Hasło</label>
             <div class="btn-group me-2" role="group" aria-label="">
              <input id="passwd_confirm" type="password" class="form-control form-control-sm" name="passwd_confirm" required minlength="8" maxlength="128" autofocus>
               <button type="button" id="togglePasswd_con" class="btn btn-sm btn-outline-dark"><span class="bi bi-eye"></span></button>
             </div>
            <script>
               document.addEventListener('DOMContentLoaded', function() {
                  const passwdInputOld = document.querySelector("#passwd_old");
                  const passwdInputCur = document.querySelector("#passwd");
                  const passwdInputCon = document.querySelector("#passwd_confirm");
                  const toggleBtnOld = document.querySelector("#togglePasswd_old");
                  const toggleBtnCur = document.querySelector("#togglePasswd_cur");
                  const toggleBtnCon = document.querySelector("#togglePasswd_con");

                  if (toggleBtnOld) {
                    toggleBtnOld.addEventListener('click', function () {
                      const newType = passwdInputOld.getAttribute('type') == 'password' ? 'text' : 'password';
                      passwdInputOld.setAttribute('type', newType);
                    });
                  }
                  if (toggleBtnCur) {
                    toggleBtnCur.addEventListener('click', function () {
                      const newType = passwdInputCur.getAttribute('type') == 'password' ? 'text' : 'password';
                      passwdInputCur.setAttribute('type', newType);
                    });
                  }
                  if (toggleBtnCon) {
                    toggleBtnCon.addEventListener('click', function () {
                      const newType = passwdInputCon.getAttribute('type') == 'password' ? 'text' : 'password';
                      passwdInputCon.setAttribute('type', newType);
                    });
                  }
               });
             </script>
          </div>
        </div>

          <div class="modal-footer">
            <button type="submit" class="btn btn-sm btn-outline-success"><span class="bi bi-floppy"></span>  Zapisz</button>
            <button type="button" class="btn btn-sm btn-outline-danger" data-bs-dismiss="modal"><span class="bi bi-x-square"></span>  Anuluj</button>
          </div>



      </form>
    </div>
  </div>
</div>
