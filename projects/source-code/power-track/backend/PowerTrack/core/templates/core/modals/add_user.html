<div class="modal fade" id="create_user">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <form method="POST" action="{%url 'manage_add_user' %}">
        {% csrf_token %}
        <div class="modal-header">
          <p class="h4"><span class="bi bi-patch-plus"></span>  Nowy Użytkownik</p>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <hr>
        <div class="modal-body">
          <div class="form-group mb-2">
            <label for="username">Nazwa użytkownika</label>
            <input id="username" type="text" class="form-control form-control-sm" name="username" required maxlength="64" minlength="4">
          </div>
          <div class="form-group mb-2">
            <label for="email">Adres email</label>
            <input id="email" type="email" class="form-control form-control-sm" name="email" required maxlength="64" minlength="4">
          </div>
          <div class="form-group mb-2">
            <label for="name">Imię</label>
            <input id="name" type="text" class="form-control form-control-sm" name="name" maxlength="64" minlength="4">
          </div>
          <div class="form-group mb-2">
            <label for="surname">Nazwisko</label>
            <input id="surname" type="text" class="form-control form-control-sm" name="surname" maxlength="64" minlength="4">
          </div>
          <div class="form-group mb-2">
            <label for="passwd">Hasło</label>
            <input id="passwd" type="password" class="form-control form-control-sm" name="passwd" maxlength="64">
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="is_staff">
            <label class="form-check-label">Administrator systemu</label>
          </div>
          <div class="form-group mb-2">
            <label for="role">Rola</label>
            <select class="form-select" id="role" name="role" required>
              <option value="user" selected>Użytkownik</option>
              <option value="operator" >Operator</option>
              <option value="admin" >Administrator</option>
            </select>
          </div>
          <div class="form-group mb-2">
            <label for="role">Grupa</label>
            <select class="form-select" id="client" name="client">
              <option value="" selected>Brak</option>
              {% for client in clients %}
              <option value="{{ client.id }}">{{ client.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn btn-sm btn-outline-success"><span class="bi bi-plus-square"></span>  Utwórz</button>
            <button type="button" class="btn btn-sm btn-outline-danger" data-bs-dismiss="modal"><span class="bi bi-x-square"></span>  Anuluj</button>
          </div>
        </div>

      </form>
    </div>
  </div>
</div>
