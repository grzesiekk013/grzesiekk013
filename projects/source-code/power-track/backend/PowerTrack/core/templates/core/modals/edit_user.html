<div class="modal fade" id="edit_user_modal{{ user.id }}">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <form method="POST" action="{%url 'manage_edit_user' user.id %}">
        {% csrf_token %}
        <div class="modal-header">
          <p class="h4"><span class="bi bi-pencil-square"></span>  Użytkownik <i>{{ user.username }}</i> </p>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <hr>
        <div class="modal-body">
          <div class="form-group mb-2">
            <label for="username">Nazwa użytkownika</label>
            <input id="username" type="text" class="form-control form-control-sm" name="username" value="{{ user.username }}" required maxlength="64" minlength="4">
          </div>
          <div class="form-group mb-2">
            <label for="email">Adres email</label>
            <input id="email" type="email" class="form-control form-control-sm" name="email" value="{{ user.email }}" required maxlength="64" minlength="4">
          </div>
          <div class="form-group mb-2">
            <label for="name">Imię</label>
            <input id="name" type="text" class="form-control form-control-sm" name="name" value="{{ user.first_name }}" maxlength="64" minlength="4">
          </div>
          <div class="form-group mb-2">
            <label for="surname">Nazwisko</label>
            <input id="surname" type="text" class="form-control form-control-sm" name="surname" value="{{ user.last_name }}" maxlength="64" minlength="4">
          </div>
          <div class="form-group mb-2">
            <label for="passwd">Nowe Hasło (Pozostaw puste by pozostawić aktualne)</label>
            <input id="passwd" type="password" class="form-control form-control-sm" name="passwd" maxlength="64">
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" name="is_staff" {% if user.is_staff %}checked{% endif %}>
            <label class="form-check-label">Administrator systemu</label>
          </div>
          <div class="form-group mb-2">
            <label for="role">Rola</label>
            <select class="form-select" id="role" name="role" required>
              <option value="user" {% if user.userrole.role == 'user' %} selected {%endif%}>Użytkownik</option>
              <option value="operator" {% if user.userrole.role == 'operator' %} selected {%endif%}>Operator</option>
              <option value="admin" {% if user.userrole.role == 'admin' %} selected {%endif%}>Administrator</option>
            </select>
          </div>
          <div class="form-group mb-2">
            <label for="role">Grupa</label>
            <select class="form-select" id="client" name="client">
              <option value="" selected>Brak</option>
              {% for client in clients %}
              <option value="{{ client.id }}" {% if user.userrole.client.id == client.id %} selected {% endif %}>{{ client.name }}</option>
              {% endfor %}
            </select>
          </div>
          <div class="modal-footer">
             <button type="submit" class="btn btn-sm btn-outline-success"><span class="bi bi-floppy"></span>  Zapisz</button>
            <button type="button" class="btn btn-sm btn-outline-danger" data-bs-dismiss="modal"><span class="bi bi-x-square"></span>  Anuluj</button>
          </div>
        </div>

      </form>
    </div>
  </div>
</div>
