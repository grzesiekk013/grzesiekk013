<div class="modal fade" id="create_raport">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <form method="POST" action="{%url 'reports_create' %}">
        {% csrf_token %}
        <div class="modal-header">
          <p class="h4"><span class="bi bi-patch-plus"></span>  Utwórz raport</p>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <hr>

        <div class="modal-body">
          <div class="form-group mb-2">
            <label for="fmeter">Licznik</label>
            <select class="form-select form-control form-select-sm" id="fmeter" name="fmeter" required>
              <option value="" selected>Pusty</option>
             {% for meter in meters %}
             <option value="{{meter.id}}">{{ meter }} ({{ meter.room }})</option>
              {% endfor %}
            </select>
          </div>
          <div class="form-group mb-2">
            <label for="fdate_from">Początek cyklu rozliczeniowego</label>
            <input id="fdate_from" type="date" class="form-control form-control-sm" name="fdate_from" required>
          </div>
          <div class="form-group mb-2">
            <label for="fdate_to">Koniec cyklu rozliczeniowego</label>
            <input id="fdate_to" type="date" class="form-control form-control-sm" name="fdate_to" required>
          </div>
          <div class="modal-footer">
            <button type="submit" class="btn btn-sm btn-outline-success"><span class="bi bi-plus-square"></span>  Utwórz</button>
            <button type="button" class="btn btn-sm btn-outline-danger" data-bs-dismiss="modal"><span class="bi bi-x-square"></span>  Anuluj</button>
          </div>
        </div>

      </form>
    </div>
  </div>
</div>
