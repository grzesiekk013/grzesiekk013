{% extends 'eye_app/base.html' %}
{% block main %}
<div class="container w-50 bg-body-secondary rounded p-4">
    <h2>Rejestracja</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-light">Zarejestruj</button>
    </form>
    <p class="mt-3">Masz już konto? <a href="{% url 'login' %}">Zaloguj się</a></p>
</div>
{% endblock %}
