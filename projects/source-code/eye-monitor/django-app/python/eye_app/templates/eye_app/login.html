{# login.html #}
{% extends 'eye_app/base.html' %}
{% block main %}
<div class="container w-50 bg-body-secondary rounded p-4">
    <h2>Zaloguj się</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-light">Zaloguj</button>
    </form>
    <p class="mt-3">Nie masz konta? <a href="{% url 'register' %}">Zarejestruj się</a></p>
</div>
{% endblock %}
